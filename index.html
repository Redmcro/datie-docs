<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>大铁API - 使用文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css">
  <style>
    :root {
      --docsifytabs-border-color: #ededed;
      --docsifytabs-tab-highlight-color: #42b983;
    }
    .qq-btn {
      display: inline-block;
      padding: 8px 20px;
      background: #12B7F5;
      color: #fff !important;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin: 10px 0;
    }
    .qq-btn:hover { background: #0ea1d9; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '大铁API',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: '搜索文档',
        noData: '没有找到结果',
      },
      auto2top: true,
      darklightTheme: {
        defaultTheme: 'dark',
        siteFont: 'Source Sans Pro, Helvetica Neue, Arial, sans-serif',
        dark: {
          accent: '#42b983',
          background: '#1e1e1e',
          textColor: '#b4b4b4',
          codeBackground: '#2d2d2d',
        },
        light: {
          accent: '#42b983',
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
</body>
</html>
