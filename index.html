<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>大铁API - 使用文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" id="theme-link">
  <style>
    .qq-btn {
      display: inline-block;
      padding: 8px 20px;
      background: #12B7F5;
      color: #fff !important;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin: 10px 0;
    }
    .qq-btn:hover { background: #0ea1d9; }
    .theme-toggle {
      position: fixed;
      top: 10px;
      right: 20px;
      z-index: 999;
      background: none;
      border: 1px solid #ccc;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    html[data-theme="dark"] .theme-toggle { border-color: #555; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式">🌙</button>
  <div id="app"></div>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var link = document.getElementById('theme-link');
      var btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        link.href = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css';
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        link.href = 'https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-dark.min.css';
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-link').href = 'https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-dark.min.css';
        document.querySelector('.theme-toggle').textContent = '☀️';
      }
    })();

    window.$docsify = {
      name: '大铁API',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: '搜索文档',
        noData: '没有找到结果',
      },
      auto2top: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
